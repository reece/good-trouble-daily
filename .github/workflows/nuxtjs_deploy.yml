# Workflow for building and deploying a Nuxt.js site to GitHub Pages
name: "Deploy to GitHub Pages"

on:
  push:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest

    # is_release_tag is used to determine whether we're running on a release
    # tag, which should trigger a deployment, or on a non-release tag/branch,
    # which should not trigger a deployment. All of this just because github 
    # doesn't have regexps. F'n ludicrous.
    outputs:
      is_release_tag: ${{ steps.check_tag.outputs.is_release_tag }}
    steps:
      - name: Check tag format
        id: check_tag
        run: |
          if [[ "${{ github.ref_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_release_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_release_tag=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
      
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get version info
        id: version
        run: |
          echo "describe=$(git describe --always --tags --dirty=+)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Load .env into environment
        run: grep -v '^#' .env | grep '=' >> $GITHUB_ENV
      
      - name: Generate static site
        run: pnpm generate
        env:
          NUXT_PUBLIC_COMMIT_SHA: ${{ steps.version.outputs.describe }}
          NUXT_PUBLIC_COMMIT_SHORT_SHA: ${{ steps.version.outputs.short_sha }}
          NUXT_PUBLIC_COMMIT_REF: ${{ github.ref_name }}
          NUXT_PUBLIC_BUILD_DATE: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          NUXT_PUBLIC_RUN_ID: ${{ github.run_id }}
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || needs.build.outputs.is_release_tag == 'true'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
